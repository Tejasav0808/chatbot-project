<!DOCTYPE html>
<html>
<head>
  <title>University Chatbot</title>
  <script src="https://www.gstatic.com/dialogflow-console/fast/messenger/bootstrap.js?v=1"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:   #1565c0;
      --accent: #00c8aa;
      --dark:   #0d1b2a;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      height: 100vh;
      background: var(--dark);
      overflow: hidden;
    }

    /* ─── SPLASH ─── */
    #splash {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 24px;
      background: var(--dark);
    }

    #collegeLogo {
      width: 240px;
      animation: zoomFade 0.8s forwards;
    }

    #botLogoWrap {
      width: 160px; height: 160px;
      display: none;
      animation: zoomFade 1s forwards;
      flex-shrink: 0;
      position: relative;
    }

    #botLogoWrap::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      box-shadow: 0 0 50px rgba(0,200,170,0.6), 0 0 0 3px var(--accent);
      pointer-events: none;
    }

    #botLogo {
      width: 100%; height: 100%;
      display: block;
      border-radius: 50%;
      mix-blend-mode: multiply;
      object-fit: contain;
    }

    .splash-tagline {
      display: none;
      font-family: 'Syne', sans-serif;
      color: var(--accent);
      font-size: 13px;
      letter-spacing: 4px;
      text-transform: uppercase;
      animation: fadeUp 1s forwards 0.2s;
      opacity: 0;
    }

    @keyframes zoomFade {
      from { opacity: 0; transform: scale(0.6); }
      to   { opacity: 1; transform: scale(1); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── LOGIN ─── */
    #loginPage {
      display: none;
      height: 100vh;
      background: var(--dark);
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    #loginPage::before {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(21,101,192,0.25) 0%, transparent 70%);
      top: -150px; left: -150px;
      pointer-events: none;
    }

    #loginPage::after {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,200,170,0.15) 0%, transparent 70%);
      bottom: -100px; right: -100px;
      pointer-events: none;
    }

    .login-container {
      width: 360px; padding: 44px 40px;
      border-radius: 24px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      text-align: center;
      animation: fadeUp 0.8s ease;
      position: relative;
      z-index: 2;
    }

    .login-logo { width: 180px; margin-bottom: 28px; }

    .login-label {
      font-family: 'Syne', sans-serif;
      color: rgba(255,255,255,0.5);
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .input-group { margin: 18px 0; }

    .input-group input,
    .input-group select {
      width: 100%; padding: 14px 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: white; font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      outline: none; border-radius: 12px;
      transition: border 0.2s, background 0.2s;
    }

    .input-group input:focus,
    .input-group select:focus {
      border-color: var(--accent);
      background: rgba(0,200,170,0.05);
    }

    .input-group input::placeholder { color: rgba(255,255,255,0.35); }
    .input-group select option { background: #1a2333; color: white; }

    .login-btn {
      width: 100%;
      margin-top: 24px;
      background: linear-gradient(135deg, var(--blue), var(--accent));
      color: white; border: none;
      padding: 15px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Syne', sans-serif;
      letter-spacing: 1px;
      transition: opacity 0.2s, transform 0.2s;
    }

    .login-btn:hover { opacity: 0.9; transform: translateY(-1px); }

    .forgot { color: rgba(255,255,255,0.4); font-size: 12px; margin-top: 14px; cursor: pointer; }
    .forgot:hover { color: var(--accent); }

    #error { color: #ff6b6b; margin-top: 10px; font-size: 13px; }

    /* ─── CHAT PAGE ─── */
    #chatPage {
      display: none;
      height: 100vh;
      flex-direction: column;
      background: var(--dark);
    }

    /* Minimal topbar */
    .chat-topbar {
      height: 56px;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      flex-shrink: 0;
    }

    .topbar-logo {
      height: 32px;
      object-fit: contain;
    }

    .topbar-divider {
      width: 1px; height: 20px;
      background: rgba(255,255,255,0.12);
    }

    .topbar-title {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      margin-right: auto;
    }

    .topbar-college {
      background: rgba(21,101,192,0.35);
      border: 1px solid rgba(21,101,192,0.5);
      color: #90caf9;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
      font-family: 'Syne', sans-serif;
    }

    .topbar-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      color: white;
      font-size: 13px;
    }

    .topbar-name {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
    }

    .topbar-logout {
      color: rgba(255,255,255,0.25);
      font-size: 18px;
      cursor: pointer;
      margin-left: 4px;
      transition: color 0.2s;
    }
    .topbar-logout:hover { color: #ff6b6b; }

    /* Full background area */
    .chat-bg {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Subtle dot grid */
    .chat-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 30px 30px;
      pointer-events: none;
    }

    /* Accent glow blob */
    .chat-bg::after {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,200,170,0.05) 0%, transparent 65%);
      pointer-events: none;
    }

    /* Center greeting */
    .chat-center {
      text-align: center;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.6s ease;
    }

    .bot-icon {
      width: 86px; height: 86px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-size: 40px;
      margin: 0 auto 18px;
      box-shadow: 0 0 0 14px rgba(21,101,192,0.08),
                  0 0 0 28px rgba(21,101,192,0.04),
                  0 0 40px rgba(0,200,170,0.15);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }

    .chat-center h2 {
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 800;
      color: white;
      margin-bottom: 8px;
    }

    .chat-center h2 span { color: var(--accent); }

    .chat-center p {
      color: rgba(255,255,255,0.35);
      font-size: 13px;
      line-height: 1.6;
      max-width: 260px;
      margin: 0 auto;
    }

    /* Hint bubble */
    .tap-hint {
      position: fixed;
      bottom: 88px;
      right: 88px;
      background: var(--accent);
      color: white;
      font-size: 12px;
      font-weight: 700;
      padding: 8px 14px;
      border-radius: 50px;
      font-family: 'Syne', sans-serif;
      pointer-events: none;
      animation: bounce 2s ease-in-out infinite;
      z-index: 9998;
    }

    .tap-hint::after {
      content: '';
      position: absolute;
      right: 18px; bottom: -7px;
      width: 14px; height: 14px;
      background: var(--accent);
      clip-path: polygon(0 0, 100% 0, 50% 100%);
    }

    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-6px); }
    }

    /* ─── DF-MESSENGER ─── */
    df-messenger {
      --df-messenger-bot-message: #ffffff;
      --df-messenger-user-message: #dcf8c6;
      --df-messenger-chat-background: #f0f4ff;
      --df-messenger-button-titlebar-color: #1565c0;
      position: fixed !important;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
    }
  </style>
</head>

<body>

<audio id="openSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<!-- ─── SPLASH ─── -->
<div id="splash">
  <img src="clg.jpg.png" id="collegeLogo">
  <div id="botLogoWrap">
    <img src="chatbotlogo.png" id="botLogo">
  </div>
  <div class="splash-tagline" id="splashTagline">Your University Assistant</div>
</div>

<!-- ─── LOGIN ─── -->
<div id="loginPage">
  <div class="login-container">
    <img src="clg.jpg.png" class="login-logo" onerror="this.style.display='none'">
    <div class="login-label">Student &amp; Staff Portal</div>

    <div class="input-group">
      <input type="text" id="username" placeholder="Login ID" required>
    </div>
    <div class="input-group">
      <input type="password" id="password" placeholder="Password" required>
    </div>
    <div class="input-group">
      <select id="college" required>
        <option value="" disabled selected>Select College</option>
        <option>MRU</option>
        <option>MRI</option>
      </select>
    </div>

    <button class="login-btn" onclick="login()">Sign In →</button>
    <div class="forgot">Forgot password?</div>
    <p id="error"></p>
  </div>
</div>

<!-- ─── CHAT PAGE ─── -->
<div id="chatPage">

  <div class="chat-topbar">
    <img src="clg.jpg.png" class="topbar-logo" onerror="this.style.display='none'">
    <div class="topbar-divider"></div>
    <span class="topbar-title">UniversityBot</span>
    <span class="topbar-college" id="topCollege">MRU</span>
    <div class="topbar-avatar" id="topAvatar">A</div>
    <span class="topbar-name" id="topName">ADMIN</span>
    <div class="topbar-logout" onclick="logout()" title="Logout">⏻</div>
  </div>

  <div class="chat-bg">
    <div class="chat-center">
      <div class="bot-icon">🤖</div>
      <h2>Hi, <span id="heroName">there</span> 👋</h2>
      <p>Tap the button below to start chatting with UniversityBot!</p>
    </div>
  </div>

  <div class="tap-hint" id="tapHint">👋 Tap to chat!</div>

</div>

<!-- ─── DIALOGFLOW MESSENGER (unchanged) ─── -->
<df-messenger
  intent="WELCOME"
  chat-title="UniversityBot"
  agent-id="bc79bef3-60cd-4890-9176-bdf170f1cc27"
  language-code="en"
  style="display:none">
</df-messenger>

<script>
  /* ── Splash ── */
  setTimeout(() => {
    document.getElementById("collegeLogo").style.display = "none";
    document.getElementById("botLogoWrap").style.display = "block";
    document.getElementById("splashTagline").style.display = "block";
  }, 1500);

  setTimeout(() => {
    document.getElementById("splash").style.display = "none";
    document.getElementById("loginPage").style.display = "flex";
  }, 3200);

  /* ── Login ── */
  function login() {
    const user = document.getElementById("username").value.trim();
    const pass = document.getElementById("password").value;
    const col  = document.getElementById("college").value;

    if (user === "admin" && pass === "8007") {
      document.getElementById("loginPage").style.display = "none";
      document.getElementById("chatPage").style.display  = "flex";

      const name    = user.toUpperCase();
      const college = col || "MRU";

      document.getElementById("topAvatar").textContent = name.charAt(0);
      document.getElementById("topName").textContent   = name;
      document.getElementById("topCollege").textContent = college;
      document.getElementById("heroName").textContent  = name;

      document.querySelector("df-messenger").style.display = "";
      document.getElementById("openSound").play().catch(() => {});
      setTimeout(openChat, 800);

      document.querySelector("df-messenger").addEventListener("df-messenger-opened", () => {
        document.getElementById("tapHint").style.display = "none";
      }, { once: true });

    } else {
      document.getElementById("error").textContent = "Invalid credentials. Please try again.";
    }
  }

  /* ── Open chatbot ── */
  function openChat() {
    try {
      const dfm = document.querySelector("df-messenger");
      if (!dfm) return;
      const shadow = dfm.shadowRoot;
      if (shadow) {
        const btn = shadow.querySelector("df-messenger-chat-bubble button") ||
                    shadow.querySelector("button") ||
                    shadow.querySelector("df-button");
        if (btn) { btn.click(); return; }
      }
      dfm.dispatchEvent(new Event("click", { bubbles: true }));
    } catch(e) {}
  }

  /* ── Message formatter: remove "Agent Says:", convert bullets ── */
  const _done = new WeakSet();

  function processMessages(root) {
    if (!root) return;
    try {
      root.querySelectorAll("*").forEach(el => {
        if (el.shadowRoot) processMessages(el.shadowRoot);
        if (["SCRIPT","STYLE","INPUT","TEXTAREA","UL","LI"].includes(el.tagName)) return;
        if (_done.has(el)) return;

        let inner = el.innerHTML || "";
        if (!inner.trim()) return;

        inner = inner.replace(/^Agent [Ss]ays:\s*/i, "").replace(/^Agent [Ss]ays\s*/i, "");

        if (inner.includes("•") && !inner.includes("<ul") && !inner.includes("<li")) {
          const stripped = inner.replace(/<[^>]+>/g, "");
          if (stripped.includes("•")) {
            const parts = stripped.split(/\s*•\s*/);
            const intro = parts[0].trim();
            const items = parts.slice(1).map(s => s.trim()).filter(Boolean);
            if (items.length > 0) {
              let html = intro ? `<span style="display:block;margin-bottom:8px;font-weight:600;">${intro}</span>` : "";
              html += `<ul style="margin:0;padding-left:20px;list-style:disc outside;text-align:left;line-height:1.8;">`;
              items.forEach(item => { html += `<li style="margin:5px 0;">${item}</li>`; });
              html += `</ul>`;
              el.innerHTML = html;
              _done.add(el);
              return;
            }
          }
        }

        if (inner !== (el.innerHTML || "")) {
          el.innerHTML = inner;
          _done.add(el);
        }
      });
    } catch(e) {}
  }

  setInterval(() => {
    const dfm = document.querySelector("df-messenger");
    if (dfm && dfm.shadowRoot) processMessages(dfm.shadowRoot);
  }, 300);

  /* ── Logout ── */
  function logout() {
    document.getElementById("chatPage").style.display = "none";
    document.querySelector("df-messenger").style.display = "none";
    document.getElementById("username").value = "";
    document.getElementById("password").value = "";
    document.getElementById("college").value  = "";
    document.getElementById("error").textContent = "";
    document.getElementById("tapHint").style.display = "block";
    document.getElementById("loginPage").style.display = "flex";
  }
</script>

</body>
</html>
